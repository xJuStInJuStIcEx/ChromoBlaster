<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chroma Sculptor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            height: 70vh;
            aspect-ratio: 9/16;
            margin-top: 2vh;
            background: #222;
            border: 2px solid #555;
            box-sizing: border-box;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer; /* Indica che si può cliccare */
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }
        #controls-container {
            width: 100%;
            max-width: 600px;
            height: 28vh;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            padding: 5px;
            box-sizing: border-box;
        }
        #palette-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: #222;
            padding: 8px;
            border-radius: 20px;
            margin: 0 auto;
        }
        .color-swatch {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #444;
            transition: all 0.2s;
        }
        .color-swatch.active {
            border: 3px solid #fff;
            transform: scale(1.4);
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
        
        .control-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 5px;
            padding: 0 5px;
            box-sizing: border-box;
        }
        button {
            background: #444;
            color: white;
            border: none;
            padding: 12px 5px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            flex: 1;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        button:active { background: #666; transform: scale(0.98); }
        
        #btn-fire-color { background: #d32f2f; border: 2px solid #ff5252; color: #fff;}
        #btn-fire-white { background: #ddd; border: 2px solid #fff; color: #000; }
        
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            align-items: center; justify-content: center; font-size: 36px; z-index: 10; text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="1024" height="1960"></canvas>
        <div id="ui-layer">
            <div>Score: <span id="score-display">0</span></div>
            <div>Time: <span id="time-display">0</span>s</div>
        </div>
        <div id="game-over">
            <div>GAME OVER</div>
            <div style="font-size: 20px; margin-top: 10px;">Punteggio Finale: <span id="final-score">0</span></div>
            <button onclick="location.reload()" style="margin-top: 20px; flex: none; padding: 15px 30px; font-size: 18px;">Riprova</button>
        </div>
    </div>

    <div id="controls-container">
        <div id="palette-container"></div>

        <div class="control-row">
            <button id="btn-left">⬅️ SX</button>
            <button id="btn-cycle">🔄 Colore</button>
            <button id="btn-right">DX ➡️</button>
        </div>
        <div class="control-row">
            <button id="btn-fire-color">🎯 Spara Colore</button>
            <button id="btn-fire-white">💥 Laser Bianco</button>
        </div>
    </div>

<script>
/**
 * CORE DEL GIOCO
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GAME_WIDTH = 1024;
const GAME_HEIGHT = 1960;
const COLS = 16; 
const BLOCK_SIZE = GAME_WIDTH / COLS;

const COLORS = ['#FF3333', '#33FF33', '#3333FF', '#FFFF33']; 
const MAX_PIECES = 3; 

const TETROMINOES = [
    [{x:0,y:0}, {x:1,y:0}, {x:2,y:0}, {x:3,y:0}], // I
    [{x:0,y:0}, {x:1,y:0}, {x:0,y:1}, {x:1,y:1}], // O
    [{x:1,y:0}, {x:0,y:1}, {x:1,y:1}, {x:2,y:1}], // T
    [{x:1,y:0}, {x:1,y:1}, {x:1,y:2}, {x:0,y:2}], // J
    [{x:0,y:0}, {x:0,y:1}, {x:0,y:2}, {x:1,y:2}], // L
    [{x:1,y:0}, {x:2,y:0}, {x:0,y:1}, {x:1,y:1}], // S
    [{x:0,y:0}, {x:1,y:0}, {x:1,y:1}, {x:2,y:1}]  // Z
];

let state = {
    pieces: [],
    floorLevel: 0, 
    score: 0,
    time: 0,
    lastThreshold: 0,
    isGameOver: false,
    player: {
        col: Math.floor(COLS / 2),
        selectedColorIndex: 0
    }
};

let lastTime = 0;
let lastSpawnTime = 0;

const uiScore = document.getElementById('score-display');
const uiTime = document.getElementById('time-display');
const gameOverScreen = document.getElementById('game-over');
const finalScoreDisplay = document.getElementById('final-score');
const paletteContainer = document.getElementById('palette-container');
const btnFireColor = document.getElementById('btn-fire-color');

function renderPalette() {
    paletteContainer.innerHTML = '';
    COLORS.forEach((color, index) => {
        let swatch = document.createElement('div');
        swatch.className = 'color-swatch';
        if (index === state.player.selectedColorIndex) swatch.classList.add('active');
        swatch.style.backgroundColor = color;
        paletteContainer.appendChild(swatch);
    });
    btnFireColor.style.backgroundColor = COLORS[state.player.selectedColorIndex];
    btnFireColor.style.borderColor = '#fff';
    btnFireColor.style.color = (COLORS[state.player.selectedColorIndex] === '#FFFF33') ? '#000' : '#fff'; 
}
renderPalette();

class Piece {
    constructor(blocks, pixelX, pixelY) {
        this.blocks = blocks;
        this.x = pixelX;
        this.y = pixelY;
        this.speed = 100;
    }

    getBoundingBox() {
        if (this.blocks.length === 0) return { minX: 0, maxX: 0, minY: 0, maxY: 0 };
        let minX = this.x + Math.min(...this.blocks.map(b => b.x)) * BLOCK_SIZE;
        let maxX = this.x + (Math.max(...this.blocks.map(b => b.x)) + 1) * BLOCK_SIZE;
        let minY = this.y + Math.min(...this.blocks.map(b => b.y)) * BLOCK_SIZE;
        let maxY = this.y + (Math.max(...this.blocks.map(b => b.y)) + 1) * BLOCK_SIZE;
        return { minX, maxX, minY, maxY };
    }

    draw(ctx) {
        for (let b of this.blocks) {
            ctx.fillStyle = b.color;
            ctx.fillRect(this.x + b.x * BLOCK_SIZE, this.y + b.y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeRect(this.x + b.x * BLOCK_SIZE, this.y + b.y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }
    }
}

function trySpawnPiece() {
    if (state.pieces.length >= MAX_PIECES) return;
    if (state.time - lastSpawnTime < 0.5) return;

    let template = TETROMINOES[Math.floor(Math.random() * TETROMINOES.length)];
    let blocks = template.map(b => ({
        x: b.x, 
        y: b.y, 
        color: COLORS[Math.floor(Math.random() * COLORS.length)]
    }));
    
    let pieceWidth = (Math.max(...blocks.map(b => b.x)) + 1);
    let pieceHeight = (Math.max(...blocks.map(b => b.y)) + 1);
    
    let maxAttempts = 20;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
        let randomCol = Math.floor(Math.random() * (COLS - pieceWidth));
        let testX = randomCol * BLOCK_SIZE;
        let testY = - (pieceHeight * BLOCK_SIZE) - 5; 

        let newBox = {
            minX: testX,
            maxX: testX + (pieceWidth * BLOCK_SIZE),
            minY: testY,
            maxY: testY + (pieceHeight * BLOCK_SIZE)
        };

        let overlap = false;
        for (let p of state.pieces) {
            let pBox = p.getBoundingBox();
            if (newBox.maxX > pBox.minX && newBox.minX < pBox.maxX) {
                if (pBox.minY < newBox.maxY + (BLOCK_SIZE * 3)) {
                    overlap = true;
                    break;
                }
            }
        }

        if (!overlap) {
            state.pieces.push(new Piece(blocks, testX, testY));
            lastSpawnTime = state.time;
            break;
        }
    }
}

// ALGORITMO ROTAZIONE AL TOCCO
function rotatePiece(pieceIndex) {
    let p = state.pieces[pieceIndex];
    
    // Calcola le nuove coordinate locali ruotate (90° orario: x -> -y, y -> x)
    let newBlocks = p.blocks.map(b => ({
        x: -b.y,
        y: b.x,
        color: b.color
    }));

    // Normalizza i blocchi in modo che non abbiano coordinate negative locali
    let minLocalX = Math.min(...newBlocks.map(b => b.x));
    let minLocalY = Math.min(...newBlocks.map(b => b.y));
    newBlocks.forEach(b => {
        b.x -= minLocalX;
        b.y -= minLocalY;
    });

    // Salva stato originale in caso di collsione
    let originalBlocks = p.blocks;
    let originalX = p.x;
    
    p.blocks = newBlocks;

    // Aggiustamento sui bordi (Wall Kick)
    let maxAbsX = p.x + (Math.max(...p.blocks.map(b => b.x)) + 1) * BLOCK_SIZE;
    if (maxAbsX > GAME_WIDTH) p.x -= (maxAbsX - GAME_WIDTH); // Spinge via dal bordo destro
    if (p.x < 0) p.x = 0; // Spinge via dal bordo sinistro

    // Controllo Sovrapposizione Anti-Incastro
    let newBox = p.getBoundingBox();
    let overlap = false;
    for (let i = 0; i < state.pieces.length; i++) {
        if (i === pieceIndex) continue; // Ignora se stesso
        let otherBox = state.pieces[i].getBoundingBox();
        
        // Semplice controllo AABB (Axis-Aligned Bounding Box)
        if (newBox.maxX > otherBox.minX && newBox.minX < otherBox.maxX &&
            newBox.maxY > otherBox.minY && newBox.minY < otherBox.maxY) {
            overlap = true;
            break;
        }
    }

    // Se c'è sovrapposizione, annulla la rotazione
    if (overlap) {
        p.blocks = originalBlocks;
        p.x = originalX;
    }
}

// EVENT LISTENER PER IL TOUCH/CLICK SUL CANVAS
canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault(); // Previene comportamenti indesiderati del browser mobile
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    // Coordinate del tocco scalate rispetto al Canvas reale
    const clickX = (e.clientX - rect.left) * scaleX;
    const clickY = (e.clientY - rect.top) * scaleY;

    // Controlla se abbiamo cliccato sopra un blocco di qualche pezzo
    for (let i = state.pieces.length - 1; i >= 0; i--) {
        let p = state.pieces[i];
        let clicked = false;
        for (let b of p.blocks) {
            let bx = p.x + b.x * BLOCK_SIZE;
            let by = p.y + b.y * BLOCK_SIZE;
            if (clickX >= bx && clickX <= bx + BLOCK_SIZE && clickY >= by && clickY <= by + BLOCK_SIZE) {
                clicked = true;
                break;
            }
        }
        if (clicked) {
            rotatePiece(i);
            break; // Ruota solo un pezzo alla volta se sono vicini
        }
    }
});


function findLargestColorRectangle(piece) {
    let bestRect = null;
    let maxArea = 0;

    let colorGroups = {};
    for (let b of piece.blocks) {
        if (!colorGroups[b.color]) colorGroups[b.color] = [];
        colorGroups[b.color].push(b);
    }

    for (let color in colorGroups) {
        let blocks = colorGroups[color];
        let blockMap = new Set(blocks.map(b => `${b.x},${b.y}`));

        for (let b of blocks) {
            let startX = b.x;
            let startY = b.y;

            let maxWidth = 1;
            while (blockMap.has(`${startX + maxWidth},${startY}`)) maxWidth++;

            for (let w = 2; w <= maxWidth; w++) {
                let h = 1;
                let valid = true;
                
                while (valid) {
                    for (let dx = 0; dx < w; dx++) {
                        if (!blockMap.has(`${startX + dx},${startY + h}`)) {
                            valid = false;
                            break;
                        }
                    }
                    if (valid) h++;
                }

                if (w >= 2 && h >= 2) {
                    let area = w * h;
                    if (area > maxArea) {
                        maxArea = area;
                        bestRect = { color, startX, startY, w, h, blocksToRemove: new Set() };
                        for (let dy = 0; dy < h; dy++) {
                            for (let dx = 0; dx < w; dx++) {
                                bestRect.blocksToRemove.add(`${startX + dx},${startY + dy}`);
                            }
                        }
                    }
                }
            }
        }
    }
    return bestRect;
}

function updateScore(points) {
    state.score += points;
    uiScore.innerText = state.score;
    
    let threshold = Math.floor(state.score / 500);
    if (threshold > state.lastThreshold) {
        state.floorLevel = Math.max(0, state.floorLevel - (threshold - state.lastThreshold));
        state.lastThreshold = threshold;
    }
}

function processPieceDestruction(pieceIndex) {
    let p = state.pieces[pieceIndex];
    let rect = findLargestColorRectangle(p);
    
    if (rect) {
        updateScore(rect.blocksToRemove.size * 10);
        p.blocks = p.blocks.filter(b => !rect.blocksToRemove.has(`${b.x},${b.y}`));
        splitPiece(p, pieceIndex);
    }
}

function splitPiece(piece, pieceIndex) {
    if (piece.blocks.length === 0) {
        state.pieces.splice(pieceIndex, 1);
        return;
    }
    
    let visited = new Set();
    let components = [];
    
    function getAdjacents(block) {
        return piece.blocks.filter(b => 
            (Math.abs(b.x - block.x) === 1 && b.y === block.y) || 
            (Math.abs(b.y - block.y) === 1 && b.x === block.x)
        );
    }

    for (let b of piece.blocks) {
        let key = `${b.x},${b.y}`;
        if (!visited.has(key)) {
            let comp = [];
            let queue = [b];
            visited.add(key);
            
            while (queue.length > 0) {
                let curr = queue.shift();
                comp.push(curr);
                let neighbors = getAdjacents(curr);
                for (let n of neighbors) {
                    let nKey = `${n.x},${n.y}`;
                    if (!visited.has(nKey)) {
                        visited.add(nKey);
                        queue.push(n);
                    }
                }
            }
            components.push(comp);
        }
    }

    if (components.length > 1 || piece.blocks.length !== components[0].length) {
        state.pieces.splice(pieceIndex, 1);
        for (let comp of components) {
            let minX = Math.min(...comp.map(b => b.x));
            let minY = Math.min(...comp.map(b => b.y));
            
            let newBlocks = comp.map(b => ({
                x: b.x - minX,
                y: b.y - minY,
                color: b.color
            }));
            
            let newAbsX = piece.x + (minX * BLOCK_SIZE);
            let newAbsY = piece.y + (minY * BLOCK_SIZE);
            
            state.pieces.push(new Piece(newBlocks, newAbsX, newAbsY));
        }
    }
}

function shoot(weaponType) {
    let targetX = state.player.col * BLOCK_SIZE;
    let lowestBlockInfo = null;
    let lowestY = -Infinity;

    for (let i = 0; i < state.pieces.length; i++) {
        let p = state.pieces[i];
        for (let j = 0; j < p.blocks.length; j++) {
            let b = p.blocks[j];
            let absX = p.x + b.x * BLOCK_SIZE;
            let absY = p.y + b.y * BLOCK_SIZE;
            
            if (Math.abs(absX - targetX) < 10) { 
                if (absY > lowestY) {
                    lowestY = absY;
                    lowestBlockInfo = { pieceIndex: i, blockIndex: j, piece: p, block: b };
                }
            }
        }
    }

    if (lowestBlockInfo) {
        let p = lowestBlockInfo.piece;
        let pIdx = lowestBlockInfo.pieceIndex;
        
        if (weaponType === 'white') {
            p.blocks.splice(lowestBlockInfo.blockIndex, 1);
            splitPiece(p, pIdx);
        } else if (weaponType === 'color') {
            let b = lowestBlockInfo.block;
            p.blocks.push({
                x: b.x,
                y: b.y + 1,
                color: COLORS[state.player.selectedColorIndex]
            });
            processPieceDestruction(pIdx);
        }
    }
}

function update(dt) {
    if (state.isGameOver) return;

    state.time += dt;
    uiTime.innerText = Math.floor(state.time);

    trySpawnPiece();

    let floorY = GAME_HEIGHT - (state.floorLevel * BLOCK_SIZE);
    let cannonY = floorY - BLOCK_SIZE;

    if (cannonY <= 0) {
        state.isGameOver = true;
        finalScoreDisplay.innerText = state.score;
        gameOverScreen.style.display = 'flex';
        return;
    }

    for (let i = state.pieces.length - 1; i >= 0; i--) {
        let p = state.pieces[i];
        p.y += p.speed * dt;

        let maxY = Math.max(...p.blocks.map(b => p.y + b.y * BLOCK_SIZE)) + BLOCK_SIZE;
        if (maxY >= floorY) {
            state.pieces.splice(i, 1);
            state.floorLevel++;
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    for(let i=1; i<COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * BLOCK_SIZE, 0);
        ctx.lineTo(i * BLOCK_SIZE, GAME_HEIGHT);
        ctx.stroke();
    }

    let floorHeightPx = state.floorLevel * BLOCK_SIZE;
    ctx.fillStyle = '#666';
    ctx.fillRect(0, GAME_HEIGHT - floorHeightPx, GAME_WIDTH, floorHeightPx);

    let cannonX = state.player.col * BLOCK_SIZE;
    let cannonY = GAME_HEIGHT - floorHeightPx - BLOCK_SIZE;
    ctx.fillStyle = '#AAA';
    ctx.beginPath();
    ctx.moveTo(cannonX, cannonY + BLOCK_SIZE);
    ctx.lineTo(cannonX + BLOCK_SIZE, cannonY + BLOCK_SIZE);
    ctx.lineTo(cannonX + BLOCK_SIZE/2, cannonY);
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.setLineDash([10, 15]);
    ctx.beginPath();
    ctx.moveTo(cannonX + BLOCK_SIZE/2, cannonY);
    ctx.lineTo(cannonX + BLOCK_SIZE/2, 0);
    ctx.stroke();
    ctx.setLineDash([]);

    for (let p of state.pieces) {
        p.draw(ctx);
    }
}

function loop(timestamp) {
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (dt > 0.1) dt = 0.1; 

    update(dt);
    draw();

    if (!state.isGameOver) {
        requestAnimationFrame(loop);
    }
}

// Input Controllers
function moveLeft() { if(state.player.col > 0) state.player.col--; }
function moveRight() { if(state.player.col < COLS - 1) state.player.col++; }
function cycleColor() {
    state.player.selectedColorIndex = (state.player.selectedColorIndex + 1) % COLORS.length;
    renderPalette(); 
}

// SISTEMA DI MOVIMENTO CONTINUO TENENDO PREMUTO IL TASTO
function addHoldListener(btnId, action) {
    let btn = document.getElementById(btnId);
    let intervalId = null;
    
    const start = (e) => {
        e.preventDefault();
        action(); // Esegui la prima volta istantaneamente
        intervalId = setInterval(action, 100); // Ripeti ogni 100ms
    };
    
    const stop = (e) => {
        e.preventDefault();
        if (intervalId) clearInterval(intervalId);
        intervalId = null;
    };

    btn.addEventListener('pointerdown', start);
    btn.addEventListener('pointerup', stop);
    btn.addEventListener('pointerleave', stop); // Se il dito scivola via dal tasto
}

addHoldListener('btn-left', moveLeft);
addHoldListener('btn-right', moveRight);

// I tasti a singolo tocco rimangono normali
document.getElementById('btn-cycle').addEventListener('click', cycleColor);
document.getElementById('btn-fire-color').addEventListener('pointerdown', (e) => { e.preventDefault(); shoot('color'); });
document.getElementById('btn-fire-white').addEventListener('pointerdown', (e) => { e.preventDefault(); shoot('white'); });

window.addEventListener('keydown', (e) => {
    if(e.code === 'ArrowLeft') moveLeft();
    if(e.code === 'ArrowRight') moveRight();
    if(e.code === 'ArrowUp' || e.code === 'KeyC') cycleColor();
    if(e.code === 'Space') shoot('color');
    if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') shoot('white');
});

requestAnimationFrame((timestamp) => {
    lastTime = timestamp;
    requestAnimationFrame(loop);
});

</script>
</body>
</html>
