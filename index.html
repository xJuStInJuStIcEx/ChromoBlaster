<script>
/**
 * INIZIALIZZAZIONE PWA (FULLSCREEN NATIVO)
 */
const svgIcon = "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%23222'/%3E%3Crect x='128' y='128' width='128' height='128' fill='%23FF3333'/%3E%3Crect x='256' y='128' width='128' height='128' fill='%2333FF33'/%3E%3Crect x='128' y='256' width='128' height='128' fill='%233333FF'/%3E%3Crect x='256' y='256' width='128' height='128' fill='%23FFFF33'/%3E%3C/svg%3E";

const manifestData = {
    name: "Chroma Sculptor",
    short_name: "Chroma",
    start_url: ".",
    display: "fullscreen", /* Impostato su fullscreen per la PWA */
    background_color: "#111111",
    theme_color: "#111111",
    icons: [{ src: svgIcon, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }]
};

const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/manifest+json'});
document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        const swCode = `
            self.addEventListener('install', (e) => { self.skipWaiting(); });
            self.addEventListener('activate', (e) => { e.waitUntil(clients.claim()); });
            self.addEventListener('fetch', (e) => { });
        `;
        const swBlob = new Blob([swCode], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log(err));
    });
}

/**
 * LOGICA FULL SCREEN E START GAME
 */
const startScreen = document.getElementById('start-screen');
const gameContainer = document.getElementById('game-container');
const controlsContainer = document.getElementById('controls-container');
const btnStartGame = document.getElementById('btn-start-game');

let gameStarted = false;

// Funzione per forzare il Fullscreen del Browser (Android/PC)
function requestFullScreen() {
    let elem = document.documentElement;
    if (elem.requestFullscreen) {
        elem.requestFullscreen().catch(err => console.log("Fullscreen negato:", err));
    } else if (elem.webkitRequestFullscreen) { /* Safari/iOS iPad */
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) { /* IE11 */
        elem.msRequestFullscreen();
    }
}

btnStartGame.addEventListener('click', () => {
    // 1. Richiedi Fullscreen
    requestFullScreen();
    
    // 2. Nascondi lo splash screen
    startScreen.style.display = 'none';
    
    // 3. Mostra i contenitori di gioco
    gameContainer.style.display = 'block';
    controlsContainer.style.display = 'flex';
    
    // 4. Avvia il motore di gioco
    if (!gameStarted) {
        gameStarted = true;
        lastTime = performance.now();
        requestAnimationFrame(loop);
    }
});


/**
 * CORE DEL GIOCO
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GAME_WIDTH = 1024;
const GAME_HEIGHT = 1960;
const COLS = 16; 
const BLOCK_SIZE = GAME_WIDTH / COLS;

// ISTRUZIONE GRAFICA: Puoi sostituire questi codici esadecimali (#FF3333) con i colori esatti della tua palette grafica!
const COLORS = ['#FF3333', '#33FF33', '#3333FF', '#FFFF33']; 
const MAX_PIECES = 3; 

const TETROMINOES = [
    [{x:0,y:0}, {x:1,y:0}, {x:2,y:0}, {x:3,y:0}], // I
    [{x:0,y:0}, {x:1,y:0}, {x:0,y:1}, {x:1,y:1}], // O
    [{x:1,y:0}, {x:0,y:1}, {x:1,y:1}, {x:2,y:1}], // T
    [{x:1,y:0}, {x:1,y:1}, {x:1,y:2}, {x:0,y:2}], // J
    [{x:0,y:0}, {x:0,y:1}, {x:0,y:2}, {x:1,y:2}], // L
    [{x:1,y:0}, {x:2,y:0}, {x:0,y:1}, {x:1,y:1}], // S
    [{x:0,y:0}, {x:1,y:0}, {x:1,y:1}, {x:2,y:1}]  // Z
];

let state = {
    pieces: [],
    floorLevel: 0, 
    score: 0,
    time: 0,
    lastThreshold: 0,
    isGameOver: false,
    player: {
        col: Math.floor(COLS / 2),
        selectedColorIndex: 0
    }
};

let lastTime = 0;
let lastSpawnTime = 0;

const uiScore = document.getElementById('score-display');
const uiTime = document.getElementById('time-display');
const gameOverScreen = document.getElementById('game-over');
const finalScoreDisplay = document.getElementById('final-score');
const paletteContainer = document.getElementById('palette-container');
const btnFireColor = document.getElementById('btn-fire-color');

function renderPalette() {
    paletteContainer.innerHTML = '';
    COLORS.forEach((color, index) => {
        let swatch = document.createElement('div');
        swatch.className = 'color-swatch';
        if (index === state.player.selectedColorIndex) swatch.classList.add('active');
        swatch.style.backgroundColor = color;
        paletteContainer.appendChild(swatch);
    });
    
    // Aggiornamento dinamico del bottone "Spara Colore"
    // Se usi una tua grafica fissa, puoi commentare le 3 righe qui sotto!
    btnFireColor.style.backgroundColor = COLORS[state.player.selectedColorIndex];
    btnFireColor.style.borderColor = '#fff';
    btnFireColor.style.color = (COLORS[state.player.selectedColorIndex] === '#FFFF33') ? '#000' : '#fff'; 
}
renderPalette();

class Piece {
    constructor(blocks, pixelX, pixelY) {
        this.blocks = blocks;
        this.x = pixelX;
        this.y = pixelY;
        this.speed = 100;
    }

    getBoundingBox() {
        if (this.blocks.length === 0) return { minX: 0, maxX: 0, minY: 0, maxY: 0 };
        let minX = this.x + Math.min(...this.blocks.map(b => b.x)) * BLOCK_SIZE;
        let maxX = this.x + (Math.max(...this.blocks.map(b => b.x)) + 1) * BLOCK_SIZE;
        let minY = this.y + Math.min(...this.blocks.map(b => b.y)) * BLOCK_SIZE;
        let maxY = this.y + (Math.max(...this.blocks.map(b => b.y)) + 1) * BLOCK_SIZE;
        return { minX, maxX, minY, maxY };
    }

    draw(ctx) {
        for (let b of this.blocks) {
            ctx.fillStyle = b.color;
            ctx.fillRect(this.x + b.x * BLOCK_SIZE, this.y + b.y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeRect(this.x + b.x * BLOCK_SIZE, this.y + b.y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }
    }
}

function trySpawnPiece() {
    if (state.pieces.length >= MAX_PIECES) return;
    if (state.time - lastSpawnTime < 0.5) return;

    let template = TETROMINOES[Math.floor(Math.random() * TETROMINOES.length)];
    let blocks = template.map(b => ({
        x: b.x, 
        y: b.y, 
        color: COLORS[Math.floor(Math.random() * COLORS.length)]
    }));
    
    let pieceWidth = (Math.max(...blocks.map(b => b.x)) + 1);
    let pieceHeight = (Math.max(...blocks.map(b => b.y)) + 1);
    
    let maxAttempts = 20;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
        let randomCol = Math.floor(Math.random() * (COLS - pieceWidth));
        let testX = randomCol * BLOCK_SIZE;
        let testY = - (pieceHeight * BLOCK_SIZE) - 5; 

        let newBox = {
            minX: testX,
            maxX: testX + (pieceWidth * BLOCK_SIZE),
            minY: testY,
            maxY: testY + (pieceHeight * BLOCK_SIZE)
        };

        let overlap = false;
        for (let p of state.pieces) {
            let pBox = p.getBoundingBox();
            if (newBox.maxX > pBox.minX && newBox.minX < pBox.maxX) {
                if (pBox.minY < newBox.maxY + (BLOCK_SIZE * 3)) {
                    overlap = true;
                    break;
                }
            }
        }

        if (!overlap) {
            state.pieces.push(new Piece(blocks, testX, testY));
            lastSpawnTime = state.time;
            break;
        }
    }
}

function rotatePiece(pieceIndex) {
    let p = state.pieces[pieceIndex];
    let newBlocks = p.blocks.map(b => ({ x: -b.y, y: b.x, color: b.color }));

    let minLocalX = Math.min(...newBlocks.map(b => b.x));
    let minLocalY = Math.min(...newBlocks.map(b => b.y));
    newBlocks.forEach(b => { b.x -= minLocalX; b.y -= minLocalY; });

    let originalBlocks = p.blocks;
    let originalX = p.x;
    p.blocks = newBlocks;

    let maxAbsX = p.x + (Math.max(...p.blocks.map(b => b.x)) + 1) * BLOCK_SIZE;
    if (maxAbsX > GAME_WIDTH) p.x -= (maxAbsX - GAME_WIDTH); 
    if (p.x < 0) p.x = 0; 

    let newBox = p.getBoundingBox();
    let overlap = false;
    for (let i = 0; i < state.pieces.length; i++) {
        if (i === pieceIndex) continue;
        let otherBox = state.pieces[i].getBoundingBox();
        if (newBox.maxX > otherBox.minX && newBox.minX < otherBox.maxX &&
            newBox.maxY > otherBox.minY && newBox.minY < otherBox.maxY) {
            overlap = true;
            break;
        }
    }

    if (overlap) { p.blocks = originalBlocks; p.x = originalX; }
}

canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault(); 
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    const clickX = (e.clientX - rect.left) * scaleX;
    const clickY = (e.clientY - rect.top) * scaleY;

    for (let i = state.pieces.length - 1; i >= 0; i--) {
        let p = state.pieces[i];
        let clicked = false;
        for (let b of p.blocks) {
            let bx = p.x + b.x * BLOCK_SIZE;
            let by = p.y + b.y * BLOCK_SIZE;
            if (clickX >= bx && clickX <= bx + BLOCK_SIZE && clickY >= by && clickY <= by + BLOCK_SIZE) {
                clicked = true;
                break;
            }
        }
        if (clicked) { rotatePiece(i); break; }
    }
});


function findLargestColorRectangle(piece) {
    let bestRect = null;
    let maxArea = 0;

    let colorGroups = {};
    for (let b of piece.blocks) {
        if (!colorGroups[b.color]) colorGroups[b.color] = [];
        colorGroups[b.color].push(b);
    }

    for (let color in colorGroups) {
        let blocks = colorGroups[color];
        let blockMap = new Set(blocks.map(b => `${b.x},${b.y}`));

        for (let b of blocks) {
            let startX = b.x; let startY = b.y;
            let maxWidth = 1;
            while (blockMap.has(`${startX + maxWidth},${startY}`)) maxWidth++;

            for (let w = 2; w <= maxWidth; w++) {
                let h = 1; let valid = true;
                while (valid) {
                    for (let dx = 0; dx < w; dx++) {
                        if (!blockMap.has(`${startX + dx},${startY + h}`)) {
                            valid = false; break;
                        }
                    }
                    if (valid) h++;
                }

                if (w >= 2 && h >= 2) {
                    let area = w * h;
                    if (area > maxArea) {
                        maxArea = area;
                        bestRect = { color, startX, startY, w, h, blocksToRemove: new Set() };
                        for (let dy = 0; dy < h; dy++) {
                            for (let dx = 0; dx < w; dx++) {
                                bestRect.blocksToRemove.add(`${startX + dx},${startY + dy}`);
                            }
                        }
                    }
                }
            }
        }
    }
    return bestRect;
}

function updateScore(points) {
    state.score += points;
    uiScore.innerText = state.score;
    
    let threshold = Math.floor(state.score / 500);
    if (threshold > state.lastThreshold) {
        state.floorLevel = Math.max(0, state.floorLevel - (threshold - state.lastThreshold));
        state.lastThreshold = threshold;
    }
}

function processPieceDestruction(pieceIndex) {
    let p = state.pieces[pieceIndex];
    let rect = findLargestColorRectangle(p);
    
    if (rect) {
        updateScore(rect.blocksToRemove.size * 10);
        p.blocks = p.blocks.filter(b => !rect.blocksToRemove.has(`${b.x},${b.y}`));
        splitPiece(p, pieceIndex);
    }
}

function splitPiece(piece, pieceIndex) {
    if (piece.blocks.length === 0) {
        state.pieces.splice(pieceIndex, 1); return;
    }
    
    let visited = new Set();
    let components = [];
    
    function getAdjacents(block) {
        return piece.blocks.filter(b => 
            (Math.abs(b.x - block.x) === 1 && b.y === block.y) || 
            (Math.abs(b.y - block.y) === 1 && b.x === block.x)
        );
    }

    for (let b of piece.blocks) {
        let key = `${b.x},${b.y}`;
        if (!visited.has(key)) {
            let comp = []; let queue = [b]; visited.add(key);
            while (queue.length > 0) {
                let curr = queue.shift(); comp.push(curr);
                let neighbors = getAdjacents(curr);
                for (let n of neighbors) {
                    let nKey = `${n.x},${n.y}`;
                    if (!visited.has(nKey)) { visited.add(nKey); queue.push(n); }
                }
            }
            components.push(comp);
        }
    }

    if (components.length > 1 || piece.blocks.length !== components[0].length) {
        state.pieces.splice(pieceIndex, 1);
        for (let comp of components) {
            let minX = Math.min(...comp.map(b => b.x));
            let minY = Math.min(...comp.map(b => b.y));
            let newBlocks = comp.map(b => ({ x: b.x - minX, y: b.y - minY, color: b.color }));
            let newAbsX = piece.x + (minX * BLOCK_SIZE);
            let newAbsY = piece.y + (minY * BLOCK_SIZE);
            state.pieces.push(new Piece(newBlocks, newAbsX, newAbsY));
        }
    }
}

function getTargetBlockInfo() {
    let targetX = state.player.col * BLOCK_SIZE;
    let lowestBlockInfo = null;
    let lowestY = -Infinity;

    for (let i = 0; i < state.pieces.length; i++) {
        let p = state.pieces[i];
        for (let j = 0; j < p.blocks.length; j++) {
            let b = p.blocks[j];
            let absX = p.x + b.x * BLOCK_SIZE;
            let absY = p.y + b.y * BLOCK_SIZE;
            
            if (Math.abs(absX - targetX) < 5) { 
                if (absY > lowestY) {
                    lowestY = absY;
                    lowestBlockInfo = { pieceIndex: i, blockIndex: j, piece: p, block: b, absX, absY };
                }
            }
        }
    }
    return lowestBlockInfo;
}

function shoot(weaponType) {
    let target = getTargetBlockInfo(); 

    if (target) {
        let p = target.piece;
        let pIdx = target.pieceIndex;
        
        if (weaponType === 'white') {
            p.blocks.splice(target.blockIndex, 1);
            splitPiece(p, pIdx);
        } else if (weaponType === 'color') {
            let b = target.block;
            p.blocks.push({
                x: b.x, y: b.y + 1, color: COLORS[state.player.selectedColorIndex]
            });
            processPieceDestruction(pIdx);
        }
    }
}

function update(dt) {
    if (state.isGameOver || !gameStarted) return;

    state.time += dt;
    uiTime.innerText = Math.floor(state.time);

    trySpawnPiece();

    let floorY = GAME_HEIGHT - (state.floorLevel * BLOCK_SIZE);
    let cannonY = floorY - BLOCK_SIZE;

    if (cannonY <= 0) {
        state.isGameOver = true;
        finalScoreDisplay.innerText = state.score;
        gameOverScreen.style.display = 'flex';
        // Forza l'uscita dal fullscreen se in game over (Opzionale)
        if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        return;
    }

    for (let i = state.pieces.length - 1; i >= 0; i--) {
        let p = state.pieces[i];
        p.y += p.speed * dt;
        let maxY = Math.max(...p.blocks.map(b => p.y + b.y * BLOCK_SIZE)) + BLOCK_SIZE;
        if (maxY >= floorY) { state.pieces.splice(i, 1); state.floorLevel++; }
    }
}

function draw() {
    ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    for(let i=1; i<COLS; i++) {
        ctx.beginPath(); ctx.moveTo(i * BLOCK_SIZE, 0); ctx.lineTo(i * BLOCK_SIZE, GAME_HEIGHT); ctx.stroke();
    }

    let floorHeightPx = state.floorLevel * BLOCK_SIZE;
    ctx.fillStyle = '#666';
    ctx.fillRect(0, GAME_HEIGHT - floorHeightPx, GAME_WIDTH, floorHeightPx);

    let cannonX = state.player.col * BLOCK_SIZE;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.04)'; 
    ctx.fillRect(cannonX, 0, BLOCK_SIZE, GAME_HEIGHT - floorHeightPx);

    let cannonY = GAME_HEIGHT - floorHeightPx - BLOCK_SIZE;
    
    // ISTRUZIONE GRAFICA CANNONE: 
    // Se hai un'immagine per il cannone puoi disegnarla sul canvas usando: 
    // const cannonImg = new Image(); cannonImg.src = 'tuo-cannone.png';
    // ctx.drawImage(cannonImg, cannonX, cannonY, BLOCK_SIZE, BLOCK_SIZE);
    // (Al momento c'è il triangolo grigio predefinito qui sotto)
    ctx.fillStyle = '#AAA';
    ctx.beginPath();
    ctx.moveTo(cannonX, cannonY + BLOCK_SIZE);
    ctx.lineTo(cannonX + BLOCK_SIZE, cannonY + BLOCK_SIZE);
    ctx.lineTo(cannonX + BLOCK_SIZE/2, cannonY);
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.setLineDash([10, 15]);
    ctx.beginPath();
    ctx.moveTo(cannonX + BLOCK_SIZE/2, cannonY); ctx.lineTo(cannonX + BLOCK_SIZE/2, 0); ctx.stroke();
    ctx.setLineDash([]);

    for (let p of state.pieces) p.draw(ctx);

    let target = getTargetBlockInfo();
    if (target) {
        let tx = target.absX; let ty = target.absY; let s = BLOCK_SIZE; let l = 16; 
        let pulse = Math.abs(Math.sin(state.time * 6)) * 0.4 + 0.6; 
        
        ctx.strokeStyle = COLORS[state.player.selectedColorIndex]; 
        ctx.globalAlpha = pulse; ctx.lineWidth = 4;
        
        ctx.beginPath();
        ctx.moveTo(tx, ty + l); ctx.lineTo(tx, ty); ctx.lineTo(tx + l, ty);
        ctx.moveTo(tx + s - l, ty); ctx.lineTo(tx + s, ty); ctx.lineTo(tx + s, ty + l);
        ctx.moveTo(tx + s, ty + s - l); ctx.lineTo(tx + s, ty + s); ctx.lineTo(tx + s - l, ty + s);
        ctx.moveTo(tx + l, ty + s); ctx.lineTo(tx, ty + s); ctx.lineTo(tx, ty + s - l);
        ctx.stroke();
        ctx.globalAlpha = 1.0; 
    }
}

function loop(timestamp) {
    if (!gameStarted) return; // Non avviare la logica finché non premi Start
    
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (dt > 0.1) dt = 0.1; 

    update(dt);
    draw();

    if (!state.isGameOver) {
        requestAnimationFrame(loop);
    }
}

function moveLeft() { if(state.player.col > 0) state.player.col--; }
function moveRight() { if(state.player.col < COLS - 1) state.player.col++; }
function cycleColor() { state.player.selectedColorIndex = (state.player.selectedColorIndex + 1) % COLORS.length; renderPalette(); }

function addHoldListener(btnId, action) {
    let btn = document.getElementById(btnId);
    let intervalId = null;
    
    const start = (e) => { e.preventDefault(); action(); intervalId = setInterval(action, 100); };
    const stop = (e) => { e.preventDefault(); if (intervalId) clearInterval(intervalId); intervalId = null; };

    btn.addEventListener('pointerdown', start);
    btn.addEventListener('pointerup', stop);
    btn.addEventListener('pointerleave', stop); 
}

addHoldListener('btn-left', moveLeft);
addHoldListener('btn-right', moveRight);

document.getElementById('btn-cycle').addEventListener('click', cycleColor);
document.getElementById('btn-fire-color').addEventListener('pointerdown', (e) => { e.preventDefault(); shoot('color'); });
document.getElementById('btn-fire-white').addEventListener('pointerdown', (e) => { e.preventDefault(); shoot('white'); });

window.addEventListener('keydown', (e) => {
    if(e.code === 'ArrowLeft') moveLeft();
    if(e.code === 'ArrowRight') moveRight();
    if(e.code === 'ArrowUp' || e.code === 'KeyC') cycleColor();
    if(e.code === 'Space') shoot('color');
    if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') shoot('white');
});

// Non invochiamo più il loop qui in fondo. Il loop si avvia dal click sul bottone "START GAME!".

</script>
