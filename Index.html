<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chroma Sculptor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            height: 80vh;
            aspect-ratio: 9/16;
            margin-top: 2vh;
            background: #222;
            border: 2px solid #555;
            box-sizing: border-box;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }
        #controls {
            width: 100%;
            max-width: 600px;
            height: 18vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }
        .control-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 10px;
        }
        button {
            background: #444;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 18px;
            border-radius: 8px;
            flex: 1;
            margin: 0 5px;
            cursor: pointer;
            user-select: none;
        }
        button:active { background: #666; }
        #btn-color-preview { width: 40px; height: 40px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-left: 10px; border: 2px solid white;}
        .weapon-white { border: 2px solid white; background: #ddd !important; color: black !important; }
        .weapon-color { border: 2px solid #ff00ff; }
        
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            align-items: center; justify-content: center; font-size: 40px; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="1024" height="1960"></canvas>
        <div id="ui-layer">
            <div>Score: <span id="score-display">0</span></div>
            <div>Time: <span id="time-display">0</span>s</div>
        </div>
        <div id="game-over">
            <div>GAME OVER</div>
            <button onclick="location.reload()" style="margin-top: 20px; flex: none;">Riprova</button>
        </div>
    </div>

    <div id="controls">
        <div class="control-row">
            <button id="btn-left">⬅️ Sinistra</button>
            <button id="btn-right">Destra ➡️</button>
        </div>
        <div class="control-row">
            <button id="btn-weapon">Arma: <span id="weapon-type">Colore</span></button>
            <button id="btn-cycle">Colore <div id="btn-color-preview"></div></button>
            <button id="btn-fire" style="background:#d32f2f; font-weight:bold;">🔥 FUOCO</button>
        </div>
    </div>

<script>
/**
 * CORE DEL GIOCO
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Costanti
const GAME_WIDTH = 1024;
const GAME_HEIGHT = 1960;
const COLS = 16; 
const BLOCK_SIZE = GAME_WIDTH / COLS; // 64px
const COLORS = ['#FF3333', '#33FF33', '#3333FF', '#FFFF33', '#FF33FF', '#33FFFF'];
const TETROMINOES = [
    [{x:0,y:0}, {x:1,y:0}, {x:2,y:0}, {x:3,y:0}], // I
    [{x:0,y:0}, {x:1,y:0}, {x:0,y:1}, {x:1,y:1}], // O
    [{x:1,y:0}, {x:0,y:1}, {x:1,y:1}, {x:2,y:1}], // T
    [{x:1,y:0}, {x:1,y:1}, {x:1,y:2}, {x:0,y:2}], // J
    [{x:0,y:0}, {x:0,y:1}, {x:0,y:2}, {x:1,y:2}], // L
    [{x:1,y:0}, {x:2,y:0}, {x:0,y:1}, {x:1,y:1}], // S
    [{x:0,y:0}, {x:1,y:0}, {x:1,y:1}, {x:2,y:1}]  // Z
];

// Stato del Gioco
let state = {
    pieces: [],
    floorLevel: 0, // Unità di blocchi (1 unità = BLOCK_SIZE)
    score: 0,
    time: 0,
    lastThreshold: 0,
    isGameOver: false,
    player: {
        col: Math.floor(COLS / 2),
        selectedColorIndex: 0,
        weaponMode: 'color' // 'color' o 'white'
    }
};

let lastTime = 0;
let spawnTimer = 0;

// Elementi UI
const uiScore = document.getElementById('score-display');
const uiTime = document.getElementById('time-display');
const uiWeaponType = document.getElementById('weapon-type');
const btnWeapon = document.getElementById('btn-weapon');
const uiColorPreview = document.getElementById('btn-color-preview');
const gameOverScreen = document.getElementById('game-over');

// Setup Iniziale
uiColorPreview.style.backgroundColor = COLORS[state.player.selectedColorIndex];
btnWeapon.classList.add('weapon-color');

class Piece {
    constructor(blocks, pixelX, pixelY) {
        this.blocks = blocks; // Array di {x, y, color} (x, y relativi alla griglia interna del pezzo)
        this.x = pixelX;      // Posizione assoluta X in pixel
        this.y = pixelY;      // Posizione assoluta Y in pixel
        this.speed = 100;     // Pixel al secondo
    }

    draw(ctx) {
        for (let b of this.blocks) {
            ctx.fillStyle = b.color;
            ctx.fillRect(this.x + b.x * BLOCK_SIZE, this.y + b.y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeRect(this.x + b.x * BLOCK_SIZE, this.y + b.y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }
    }
}

function spawnPieces(count) {
    for (let i = 0; i < count; i++) {
        let template = TETROMINOES[Math.floor(Math.random() * TETROMINOES.length)];
        let blocks = template.map(b => ({
            x: b.x, 
            y: b.y, 
            color: COLORS[Math.floor(Math.random() * COLORS.length)]
        }));
        
        let pieceWidth = (Math.max(...blocks.map(b => b.x)) + 1);
        let randomCol = Math.floor(Math.random() * (COLS - pieceWidth));
        
        let newPiece = new Piece(blocks, randomCol * BLOCK_SIZE, -200 - (i * BLOCK_SIZE * 3));
        state.pieces.push(newPiece);
    }
}

function checkRectangle(piece) {
    if (piece.blocks.length < 2) return false;
    
    let firstColor = piece.blocks[0].color;
    for (let b of piece.blocks) {
        if (b.color !== firstColor) return false; // Non è un colore unico
    }

    let minX = Math.min(...piece.blocks.map(b => b.x));
    let maxX = Math.max(...piece.blocks.map(b => b.x));
    let minY = Math.min(...piece.blocks.map(b => b.y));
    let maxY = Math.max(...piece.blocks.map(b => b.y));

    let width = maxX - minX + 1;
    let height = maxY - minY + 1;

    // Se l'area del bounding box è uguale al numero di blocchi, è un rettangolo perfetto
    return (width * height === piece.blocks.length);
}

function updateScore(points) {
    state.score += points;
    uiScore.innerText = state.score;
    
    // Controlla l'abbassamento del pavimento
    let threshold = Math.floor(state.score / 500);
    if (threshold > state.lastThreshold) {
        state.floorLevel = Math.max(0, state.floorLevel - (threshold - state.lastThreshold));
        state.lastThreshold = threshold;
    }
}

function processPieceDestruction(pieceIndex) {
    let p = state.pieces[pieceIndex];
    if (checkRectangle(p)) {
        updateScore(p.blocks.length * 10);
        state.pieces.splice(pieceIndex, 1); // Esplode
    }
}

function splitPiece(piece, pieceIndex) {
    if (piece.blocks.length === 0) {
        state.pieces.splice(pieceIndex, 1);
        return;
    }
    
    // BFS per trovare i componenti connessi
    let visited = new Set();
    let components = [];
    
    function getAdjacents(block) {
        return piece.blocks.filter(b => 
            (Math.abs(b.x - block.x) === 1 && b.y === block.y) || 
            (Math.abs(b.y - block.y) === 1 && b.x === block.x)
        );
    }

    for (let b of piece.blocks) {
        let key = `${b.x},${b.y}`;
        if (!visited.has(key)) {
            let comp = [];
            let queue = [b];
            visited.add(key);
            
            while (queue.length > 0) {
                let curr = queue.shift();
                comp.push(curr);
                let neighbors = getAdjacents(curr);
                for (let n of neighbors) {
                    let nKey = `${n.x},${n.y}`;
                    if (!visited.has(nKey)) {
                        visited.add(nKey);
                        queue.push(n);
                    }
                }
            }
            components.push(comp);
        }
    }

    if (components.length > 1) {
        // Rimuovi il pezzo originale
        state.pieces.splice(pieceIndex, 1);
        
        // Crea nuovi pezzi indipendenti
        for (let comp of components) {
            let minX = Math.min(...comp.map(b => b.x));
            let minY = Math.min(...comp.map(b => b.y));
            
            // Ricalibra le coordinate relative al nuovo bounding box
            let newBlocks = comp.map(b => ({
                x: b.x - minX,
                y: b.y - minY,
                color: b.color
            }));
            
            let newAbsX = piece.x + (minX * BLOCK_SIZE);
            let newAbsY = piece.y + (minY * BLOCK_SIZE);
            
            state.pieces.push(new Piece(newBlocks, newAbsX, newAbsY));
        }
    }
}

function fire() {
    let targetX = state.player.col * BLOCK_SIZE;
    let lowestBlockInfo = null;
    let lowestY = -Infinity;

    // Trova il blocco più in basso nella colonna del giocatore
    for (let i = 0; i < state.pieces.length; i++) {
        let p = state.pieces[i];
        for (let j = 0; j < p.blocks.length; j++) {
            let b = p.blocks[j];
            let absX = p.x + b.x * BLOCK_SIZE;
            let absY = p.y + b.y * BLOCK_SIZE;
            
            // Check se il blocco si trova visivamente nella colonna del cannone
            if (Math.abs(absX - targetX) < 10) { 
                if (absY > lowestY) {
                    lowestY = absY;
                    lowestBlockInfo = { pieceIndex: i, blockIndex: j, piece: p, block: b };
                }
            }
        }
    }

    if (lowestBlockInfo) {
        let p = lowestBlockInfo.piece;
        let pIdx = lowestBlockInfo.pieceIndex;
        
        if (state.player.weaponMode === 'white') {
            // Laser Bianco: Distrugge
            p.blocks.splice(lowestBlockInfo.blockIndex, 1);
            splitPiece(p, pIdx);
        } else {
            // Raggio Colorato: Aggiunge sotto
            let b = lowestBlockInfo.block;
            p.blocks.push({
                x: b.x,
                y: b.y + 1,
                color: COLORS[state.player.selectedColorIndex]
            });
            processPieceDestruction(pIdx);
        }
    }
}

function update(dt) {
    if (state.isGameOver) return;

    state.time += dt;
    uiTime.innerText = Math.floor(state.time);

    // Gestione Spawns in base al tempo
    spawnTimer += dt;
    let currentWaveSize = Math.floor(state.time / 30) + 1; // 0-30->1, 31-60->2, ecc.
    
    if (spawnTimer >= 3) { // Spawna ogni 3 secondi
        spawnPieces(currentWaveSize);
        spawnTimer = 0;
    }

    let floorY = GAME_HEIGHT - (state.floorLevel * BLOCK_SIZE);
    let cannonY = floorY - BLOCK_SIZE;

    // Game Over condition
    if (cannonY <= 0) {
        state.isGameOver = true;
        gameOverScreen.style.display = 'flex';
        return;
    }

    // Aggiornamento posizioni
    for (let i = state.pieces.length - 1; i >= 0; i--) {
        let p = state.pieces[i];
        p.y += p.speed * dt;

        // Collisione col pavimento
        let maxY = Math.max(...p.blocks.map(b => p.y + b.y * BLOCK_SIZE)) + BLOCK_SIZE;
        if (maxY >= floorY) {
            // Elimina il pezzo, alza il pavimento
            state.pieces.splice(i, 1);
            state.floorLevel++;
        }
    }
}

function draw() {
    // Sfondo e griglia
    ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    for(let i=1; i<COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * BLOCK_SIZE, 0);
        ctx.lineTo(i * BLOCK_SIZE, GAME_HEIGHT);
        ctx.stroke();
    }

    // Pavimento
    let floorHeightPx = state.floorLevel * BLOCK_SIZE;
    ctx.fillStyle = '#666';
    ctx.fillRect(0, GAME_HEIGHT - floorHeightPx, GAME_WIDTH, floorHeightPx);

    // Cannone
    let cannonX = state.player.col * BLOCK_SIZE;
    let cannonY = GAME_HEIGHT - floorHeightPx - BLOCK_SIZE;
    ctx.fillStyle = '#AAA';
    ctx.beginPath();
    ctx.moveTo(cannonX, cannonY + BLOCK_SIZE);
    ctx.lineTo(cannonX + BLOCK_SIZE, cannonY + BLOCK_SIZE);
    ctx.lineTo(cannonX + BLOCK_SIZE/2, cannonY);
    ctx.fill();

    // Linea di mira
    ctx.strokeStyle = state.player.weaponMode === 'white' ? 'rgba(255,255,255,0.2)' : 'rgba(255,0,255,0.2)';
    ctx.setLineDash([10, 15]);
    ctx.beginPath();
    ctx.moveTo(cannonX + BLOCK_SIZE/2, cannonY);
    ctx.lineTo(cannonX + BLOCK_SIZE/2, 0);
    ctx.stroke();
    ctx.setLineDash([]);

    // Pezzi
    for (let p of state.pieces) {
        p.draw(ctx);
    }
}

function loop(timestamp) {
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (dt > 0.1) dt = 0.1; // previene salti giganti se si cambia tab

    update(dt);
    draw();

    if (!state.isGameOver) {
        requestAnimationFrame(loop);
    }
}

// Input Handling
function moveLeft() { if(state.player.col > 0) state.player.col--; }
function moveRight() { if(state.player.col < COLS - 1) state.player.col++; }
function cycleColor() {
    state.player.selectedColorIndex = (state.player.selectedColorIndex + 1) % COLORS.length;
    uiColorPreview.style.backgroundColor = COLORS[state.player.selectedColorIndex];
}
function toggleWeapon() {
    if (state.player.weaponMode === 'color') {
        state.player.weaponMode = 'white';
        btnWeapon.classList.remove('weapon-color');
        btnWeapon.classList.add('weapon-white');
        uiWeaponType.innerText = "Bianca";
    } else {
        state.player.weaponMode = 'color';
        btnWeapon.classList.remove('weapon-white');
        btnWeapon.classList.add('weapon-color');
        uiWeaponType.innerText = "Colore";
    }
}

// Eventi Bottoni UI
document.getElementById('btn-left').addEventListener('click', moveLeft);
document.getElementById('btn-right').addEventListener('click', moveRight);
document.getElementById('btn-cycle').addEventListener('click', cycleColor);
document.getElementById('btn-weapon').addEventListener('click', toggleWeapon);
document.getElementById('btn-fire').addEventListener('click', fire);

// Controlli Tastiera (per test su PC)
window.addEventListener('keydown', (e) => {
    if(e.code === 'ArrowLeft') moveLeft();
    if(e.code === 'ArrowRight') moveRight();
    if(e.code === 'ArrowUp' || e.code === 'KeyC') cycleColor();
    if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') toggleWeapon();
    if(e.code === 'Space') fire();
});

// Avvio
requestAnimationFrame((timestamp) => {
    lastTime = timestamp;
    requestAnimationFrame(loop);
});

</script>
</body>
</html>
